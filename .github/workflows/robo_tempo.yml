name: Robô da Previsão do Tempo

on:
  schedule:
    # 9h de Brasília = 12h UTC
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  rodar-robo:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Copiar repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib

    - name: Executar script de previsão
      run: python previsao.py

    - name: Salvar gráfico no repositório
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add previsao_goiania.png
        git diff --quiet && git diff --staged --quiet || git commit -m "Atualizando gráfico da previsão [skip ci]"
        git push
